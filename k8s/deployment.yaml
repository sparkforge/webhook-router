---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-router
  namespace: default
  labels:
    app: webhook-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-router
  template:
    metadata:
      labels:
        app: webhook-router
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
      - name: webhook-router
        image: ghcr.io/sparkforge/webhook-router:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: OPENCLAW_WEBHOOK_URL
          value: "http://host.minikube.internal:18789/hooks"
        - name: WEBHOOK_TOKEN
          valueFrom:
            secretKeyRef:
              name: webhook-router-secret
              key: token
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-router
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: webhook-router
