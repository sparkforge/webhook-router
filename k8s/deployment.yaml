---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-router
  namespace: sparkforge
  labels:
    app: webhook-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-router
  template:
    metadata:
      labels:
        app: webhook-router
    metadata:
      labels:
        app: webhook-router
      annotations:
        operator.1password.io/inject: "webhook-router"
        operator.1password.io/version: "2"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: webhook-router
        image: ghcr.io/sparkforge/webhook-router:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: OPENCLAW_WEBHOOK_URL
          value: "http://10.42.0.1:18789/hooks"
        - name: WEBHOOK_SECRET
          value: "op://K8s - SparkForge/webhook-router/token"
        - name: OP_SERVICE_ACCOUNT_TOKEN
          valueFrom:
            secretKeyRef:
              name: op-service-account
              key: token
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-router
  namespace: sparkforge
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: webhook-router
