---
# This secret must be created manually with the actual token
# kubectl create secret generic webhook-router-secret \
#   --from-literal=token=YOUR_WEBHOOK_TOKEN_HERE \
#   --namespace=sparkforge
apiVersion: v1
kind: Secret
metadata:
  name: webhook-router-secret
  namespace: sparkforge
type: Opaque
data:
  # Base64 encoded token - replace with actual value
  token: ""
