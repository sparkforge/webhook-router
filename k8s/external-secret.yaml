---
# Webhook Router secret token from 1Password (k8s - SparkForge vault)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webhook-router-secret
  namespace: sparkforge
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sparkforge
  target:
    name: webhook-router-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: "webhook-router/token"
    - secretKey: telnyx-api-key
      remoteRef:
        key: "Telnyx API Key/api key"
