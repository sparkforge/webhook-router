---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webhook-router
  namespace: sparkforge
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
spec:
  tls:
  - hosts:
    - hooks.sparkforge.io
    secretName: hooks-sparkforge-tls
  rules:
  - host: hooks.sparkforge.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webhook-router
            port:
              number: 80
